name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any earlier runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-sync:
    name: SDK sync (proof/sdk vs src/sdk drift check)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Round-6 R3-NEW-9 fan-out drift check
        run: node scripts/check-sdk-sync.js

  jest:
    name: Jest suite (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [core, algorithms, bots, api, full]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Run jest
        run: |
          case "${{ matrix.suite }}" in
            core)       npx jest tests/sdk-core.test.js --forceExit ;;
            algorithms) npx jest tests/behavioral-algorithms.test.js --forceExit ;;
            bots)       npx jest tests/bot-harness.test.js --forceExit ;;
            api)        npx jest tests/api-server.test.js --forceExit ;;
            full)       npm test ;;
          esac

  flow:
    name: CME flow regression (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        variant: [paste, human, bot]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Puppeteer needs a few system libs in headless mode on the GitHub runner.
      - name: Install headless-chrome system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2 libgtk-3-0
      - name: Run regression
        run: node scripts/test-cme-flow-narrative.js --variant=${{ matrix.variant }}

  tampering:
    name: Tamper-evidence (100 random tampers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Install headless-chrome system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2 libgtk-3-0
      - name: Start static server
        run: |
          npx http-server proof -p 4000 -c-1 --silent &
          for i in {1..20}; do
            curl -sf http://127.0.0.1:4000/cme-demo.html > /dev/null && break
            sleep 0.5
          done
      - name: Run tampering attack
        run: node scripts/test-tampering-attack.js

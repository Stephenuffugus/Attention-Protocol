<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, sans-serif;
      background: #0a0e17;
      color: #f1f5f9;
      padding: 20px;
    }
    h1 {
      font-size: 16px;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .subtitle { font-size: 11px; color: #64748b; margin-bottom: 16px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
    .progress-section { margin-bottom: 16px; }
    .progress-label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-track { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #06b6d4, #8b5cf6); transition: width 0.3s; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot.active { background: #10b981; }
    .status-dot.idle { background: #f59e0b; }
    .privacy-note { font-size: 10px; color: #475569; margin-top: 12px; line-height: 1.5; border-top: 1px solid #1e293b; padding-top: 12px; }
  </style>
</head>
<body>
  <h1>Grove Keeper</h1>
  <p class="subtitle">SWS Attention Protocol</p>

  <div class="stat-grid">
    <div class="stat">
      <div class="stat-value" id="hashesToday">0</div>
      <div class="stat-label">Hashes Today</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="activeMinutes">0</div>
      <div class="stat-label">Active Minutes</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Daily Progress</span>
      <span id="dailyProgress">0 / 36</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="dailyBar" style="width: 0%"></div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Hourly Cap</span>
      <span id="hourlyProgress">0 / 6</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="hourlyBar" style="width: 0%"></div>
    </div>
  </div>

  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <p class="privacy-note">Grove Keeper never tracks which sites you visit. It only measures aggregate browsing time. Your privacy is protected by architecture.</p>

  <script src="popup.js"></script>
</body>
</html>
